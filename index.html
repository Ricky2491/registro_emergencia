<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Alerta y Localización de Heridos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        body { background: linear-gradient(135deg, #eef2f7 0%, #dfe6e9 100%); min-height: 100vh; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
        .navbar-emergency { background-color: #dc3545; border-bottom: 4px solid #bd2130; }
        .card-custom { background: #ffffff; border: 1px solid rgba(0, 0, 0, 0.08); border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); padding: 2rem !important; }
        .section-title { font-weight: 700; color: #2d3436; letter-spacing: -0.5px; }
        .form-label { font-weight: 600; color: #495057; font-size: 0.9rem; margin-bottom: 0.4rem; }
        .form-control-custom { border: 2px solid #ced4da; border-radius: 10px; padding: 0.75rem 1rem; font-size: 1rem; color: #212529; background-color: #f8f9fa; }
        .form-control-custom:focus { border-color: #dc3545; outline: 0; box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.15); }
        .gps-box { background-color: #f8f9fa; border: 2px dashed #dee2e6; border-radius: 12px; padding: 1.25rem; }
        .table-responsive-custom { max-height: 520px; overflow-y: auto; border-radius: 12px; border: 1px solid #dee2e6; }
        .table-custom thead th { background-color: #2d3436; color: #ffffff; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; padding: 1rem; position: sticky; top: 0; }
        .table-custom tbody td { padding: 1rem; color: #2d3436; border-bottom: 1px solid #edf2f7; }
        .spin-pulse { animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        /* Estilo para inputs de filtro */
        .filter-input { border-radius: 8px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-emergency shadow-sm py-3">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold"><i class="bi bi-exclamation-triangle-fill me-2 text-warning"></i> REPORTES DE EMERGENCY - VENEZUELA</span>
        </div>
    </nav>

    <div class="container my-5">
        <div id="liveAlertPlaceholder"></div>

        <div class="row g-4">
            <div class="col-12 col-lg-4">
                <div class="card card-custom">
                    <h1 class="section-title mb-4 border-bottom pb-2"><i class="bi bi-person-plus-fill text-danger me-2"></i>Registrar Herido</h1>
                    <form id="formRegistro" novalidate>
                        <div class="mb-4">
                            <label for="cedula" class="form-label">Cédula de Identidad</label>
                            <input type="text" class="form-control form-control-custom" id="cedula" placeholder="Ej: V-12345678" required>
                        </div>
                        <div class="mb-4">
                            <label for="nombres" class="form-label">Nombres</label>
                            <input type="text" class="form-control form-control-custom" id="nombres" placeholder="Nombres del herido" required>
                        </div>
                        <div class="mb-4">
                            <label for="apellidos" class="form-label">Apellidos</label>
                            <input type="text" class="form-control form-control-custom" id="apellidos" placeholder="Apellidos del herido" required>
                        </div>
                        <div class="mb-4 gps-box">
                            <label class="form-label d-block fw-bold mb-2"><i class="bi bi-geo-alt-fill text-danger me-1"></i>Geolocalización</label>
                            <div id="gpsStatus" class="text-muted small"><i class="bi bi-circle-sync"></i> Listo para capturar coordenadas...</div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 py-3 fw-bold shadow-sm" id="btnEnviar" style="border-radius: 10px;">
                            <span id="btnText"><i class="bi bi-send-fill me-2"></i>Enviar Reporte</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="card card-custom">
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
                        <h4 class="section-title mb-0"><i class="bi bi-journal-medical text-danger me-2"></i>Monitoreo en Tiempo Real</h4>
                        <span class="badge bg-success p-2 px-3 spin-pulse" id="syncStatus"><i class="bi bi-arrow-repeat me-1"></i> Sistema Activo</span>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-md-7">
                            <input type="text" id="filtroTexto" class="form-control filter-input" placeholder="🔍 Buscar por nombre o cédula...">
                        </div>
                        <div class="col-md-5">
                            <select id="filtroEstado" class="form-select filter-input">
                                <option value="">Todos los Estados</option>
                                <option value="Perdido">Perdido</option>
                                <option value="Encontrado">Encontrado</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-responsive table-responsive-custom">
                        <table class="table table-custom align-middle">
                            <thead>
                                <tr>
                                    <th>Fecha / Hora</th>
                                    <th>Cédula</th>
                                    <th>Herido</th>
                                    <th>Estado</th>
                                    <th>Ubicación</th>
                                    <th>Cambiar Estado</th>
                                </tr>
                            </thead>
                            <tbody id="tablaCuerpo">
                                <tr><td colspan="6" class="text-center text-muted py-5">Cargando base de datos...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkfHhaNB4M7LOSNQKIj5D-6yAa4DcnJ9wfJn2YLrwcyC2-mO8Csu1MxLTs8NQTB6FP/exec';
        const form = document.getElementById('formRegistro');
        const filtroTexto = document.getElementById('filtroTexto');
        const filtroEstado = document.getElementById('filtroEstado');
        const alertPlaceholder = document.getElementById('liveAlertPlaceholder');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!navigator.geolocation) {
                alert("Tu dispositivo no soporta geolocalización.");
                return;
            }

            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            btnText.classList.add('d-none');
            btnSpinner.classList.remove('d-none');

            navigator.geolocation.getCurrentPosition((posicion) => {
                const payload = {
                    cedula: document.getElementById('cedula').value.trim(),
                    nombres: document.getElementById('nombres').value.trim(),
                    apellidos: document.getElementById('apellidos').value.trim(),
                    latitud: posicion.coords.latitude,
                    longitud: posicion.coords.longitude
                };

                fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                })
                .then(() => {
                    alert("Registro enviado exitosamente.");
                    form.reset();
                    cargarDatosTabla();
                })
                .catch(() => alert("Error al enviar el registro."))
                .finally(() => {
                    btnText.classList.remove('d-none');
                    btnSpinner.classList.add('d-none');
                });
            }, () => {
                alert("Activa tu GPS para registrar.");
                btnText.classList.remove('d-none');
                btnSpinner.classList.add('d-none');
            });
        });

        function aplicarFiltros() {
            const texto = filtroTexto.value.toLowerCase();
            const estado = filtroEstado.value.toLowerCase();
            const filas = document.querySelectorAll('#tablaCuerpo tr');

            filas.forEach(fila => {
                if (fila.cells.length < 3) return; 
                
                const cedula = fila.cells[1].innerText.toLowerCase();
                const nombre = fila.cells[2].innerText.toLowerCase();
                const badge = fila.querySelector('.badge-estado') ? fila.querySelector('.badge-estado').innerText.toLowerCase() : "";

                const coincideTexto = cedula.includes(texto) || nombre.includes(texto);
                const coincideEstado = estado === "" || badge.includes(estado);

                fila.style.display = (coincideTexto && coincideEstado) ? '' : 'none';
            });
        }

        filtroTexto.addEventListener('input', aplicarFiltros);
        filtroEstado.addEventListener('change', aplicarFiltros);

        window.addEventListener('DOMContentLoaded', () => {
            cargarDatosTabla();
            setInterval(cargarDatosTabla, 15000);
        });

        function confirmarCambio(btn, rowIndex) {
            if(confirm('¿Deseas cambiar el estado a encontrado?')) {
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'update', rowIndex: rowIndex })
                })
                .then(() => {
                    cargarDatosTabla();
                })
                .catch(() => alert("Error al actualizar el estado"));
            }
        }

        function cargarDatosTabla() {
            const tbody = document.getElementById('tablaCuerpo');
            fetch(SCRIPT_URL)
            .then(res => {
                if (!res.ok) throw new Error('Error al conectar con el servidor: ' + res.status);
                return res.json();
            })
            .then(data => {
                tbody.innerHTML = '';
                data.reverse().forEach(registro => {
                    const tr = document.createElement('tr');
                    const nombreCompleto = `${registro.nombres || ''} ${registro.apellidos || ''}`.trim();
                    const esEncontrado = registro.estado === 'Encontrado';
                    
                    tr.innerHTML = `
                        <td class="small fw-bold text-secondary">${new Date(registro.fecha).toLocaleString()}</td>
                        <td class="fw-semibold">${registro.cedula || '-'}</td>
                        <td>${nombreCompleto}</td>
                        <td><span class="badge ${esEncontrado ? 'bg-success' : 'bg-danger'} badge-estado">${registro.estado}</span></td>
                        <td class="text-center"><a href="https://www.google.com/maps/search/?api=1&query=${registro.latitud},${registro.longitud}" target="_blank" class="btn btn-sm btn-dark"><i class="bi bi-geo-alt"></i></a></td>
                        <td class="text-center">${!esEncontrado ? `<button class="btn btn-sm btn-success" onclick="confirmarCambio(this, ${registro.rowIndex})"><i class="bi bi-check-lg"></i></button>` : ''}</td>
                    `;
                    tbody.appendChild(tr);
                });
                aplicarFiltros();
            })
            .catch(err => {
                console.error("Error cargando tabla:", err);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Error: No se pudieron cargar los datos. Revisa la consola (F12).</td></tr>`;
            });
        }
    </script>
</body>
</html>
